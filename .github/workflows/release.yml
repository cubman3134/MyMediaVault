name: Build & Release

# Builds the native app for Windows, macOS, Linux, and Android / Android TV.
# On a version tag (v*) the artifacts are attached to a GitHub Release; on a manual
# run they're uploaded as workflow artifacts so the build can be tested without publishing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: '6.8.3'
  SDL2_VERSION: '2.30.9'

jobs:
  # ---------------------------------------------------------------- Windows ---
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: 'qtmultimedia qtpdf'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Fetch libmpv (dev)
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest'
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-dev-x86_64-2*' -and $_.name -notlike '*-v3-*' } | Select-Object -First 1
          if (-not $asset) { throw 'No mpv-dev-x86_64 asset found' }
          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile mpv-dev.7z
          New-Item -ItemType Directory -Force -Path mpv | Out-Null
          7z x mpv-dev.7z -ompv | Out-Null
          $dll = Get-ChildItem mpv -Recurse -Filter 'libmpv-2.dll' | Select-Object -First 1
          if (-not $dll) { throw 'libmpv-2.dll not found in package' }
          Write-Host "DLL: $($dll.FullName)"
          # Build the MSVC import library from the DLL's REAL export names (robust regardless of how the
          # shipped .def is formatted — the prior def-based lib produced unresolved symbols).
          $names = & dumpbin /nologo /exports $dll.FullName | ForEach-Object {
            if ($_ -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]{8}\s+(\S+)') { $Matches[1] }
          }
          Write-Host "Parsed $($names.Count) exports"
          if ($names.Count -lt 20) { throw "Too few exports parsed ($($names.Count))" }
          "EXPORTS" | Set-Content mpv\libmpv.def -Encoding ascii
          $names | Add-Content mpv\libmpv.def -Encoding ascii
          lib /nologo /def:mpv\libmpv.def /name:libmpv-2.dll /out:mpv\mpv.lib /MACHINE:X64
          if (-not (& dumpbin /nologo /linkermember:1 mpv\mpv.lib | Select-String 'mpv_create')) {
            throw 'Generated mpv.lib is missing mpv_create'
          }
          "MPV_DIR=$((Resolve-Path mpv).Path)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Fetch SDL2 (dev)
        shell: pwsh
        run: |
          $url = "https://github.com/libsdl-org/SDL/releases/download/release-$env:SDL2_VERSION/SDL2-devel-$env:SDL2_VERSION-VC.zip"
          Invoke-WebRequest $url -OutFile sdl2.zip
          Expand-Archive sdl2.zip -DestinationPath sdl2 -Force
          "SDL2_DIR=$((Resolve-Path "sdl2/SDL2-$env:SDL2_VERSION").Path)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure
        shell: pwsh
        run: |
          cmake -S native -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DMYMEDIAVAULT_BUILD_APP=ON `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DMPV_INCLUDE_DIR="$env:MPV_DIR/include" `
            -DMPV_LIBRARY="$env:MPV_DIR/mpv.lib" `
            -DSDL2_INCLUDE_DIR="$env:SDL2_DIR/include" `
            -DSDL2_LIBRARY="$env:SDL2_DIR/lib/x64/SDL2.lib"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $dist = "dist/MyMediaVault"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item build/MyMediaVault.exe $dist/
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release --no-translations --no-system-d3d-compiler --qmldir native/src/theme2/qml "$dist/MyMediaVault.exe"
          Copy-Item "$env:MPV_DIR/libmpv-2.dll" $dist/
          Copy-Item "$env:SDL2_DIR/lib/x64/SDL2.dll" $dist/
          # Bundle the sample addons + the StreamingAssets the app ships with.
          if (Test-Path native/addons)    { Copy-Item native/addons    "$dist/addons"    -Recurse -Force }
          if (Test-Path native/themes2)   { Copy-Item native/themes2   "$dist/themes2"   -Recurse -Force }
          Copy-Item native/resources/Uninstall.cmd "$dist/"  # standalone uninstaller (for when the app won't launch)
          Compress-Archive -Path "$dist/*" -DestinationPath MyMediaVault-windows-x64.zip -Force
          # Ship the debug symbols as a SEPARATE asset (not in the app zip — no need to bloat every download by
          # ~25 MB). Keep it to symbolize a crash report from this exact build: match the .pdb to a dump by GUID.
          if (Test-Path build/MyMediaVault.pdb) { Compress-Archive -Path build/MyMediaVault.pdb -DestinationPath MyMediaVault-windows-x64-pdb.zip -Force }

      - uses: actions/upload-artifact@v4
        with:
          name: MyMediaVault-windows-x64
          path: |
            MyMediaVault-windows-x64.zip
            MyMediaVault-windows-x64-pdb.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MyMediaVault-windows-x64.zip
            MyMediaVault-windows-x64-pdb.zip
          generate_release_notes: true

  # ------------------------------------------------------------------ macOS ---
  macos:
    # Pinned (not macos-latest): the newest SDK on the rolling 'latest' image dropped the legacy AGL
    # framework that the Qt/GL link still references. macos-14 (arm64) ships an SDK that still has it.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install mpv sdl2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtmultimedia qtpdf'
          cache: true

      - name: Configure
        run: |
          cmake -S native -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMYMEDIAVAULT_BUILD_APP=ON \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DMPV_INCLUDE_DIR="$(brew --prefix mpv)/include" \
            -DMPV_LIBRARY="$(brew --prefix mpv)/lib/libmpv.dylib" \
            -DSDL2_INCLUDE_DIR="$(brew --prefix sdl2)/include/SDL2" \
            -DSDL2_LIBRARY="$(brew --prefix sdl2)/lib/libSDL2.dylib"

      - name: Build
        run: cmake --build build --config Release

      - name: Package (.dmg)
        run: |
          APP=$(find build -name 'MyMediaVault.app' -maxdepth 3 | head -n1)
          if [ -z "$APP" ]; then echo "No .app bundle produced"; ls -R build | head -50; exit 1; fi
          "$QT_ROOT_DIR/bin/macdeployqt" "$APP" -dmg
          mv "$(dirname "$APP")/MyMediaVault.dmg" MyMediaVault-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: MyMediaVault-macos-arm64
          path: MyMediaVault-macos-arm64.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MyMediaVault-macos-arm64.dmg
          generate_release_notes: true

  # ------------------------------------------------------------------ Linux ---
  linux:
    runs-on: ubuntu-22.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build \
            libmpv-dev libsdl2-dev \
            libgl1-mesa-dev libegl1-mesa-dev libpulse-dev \
            libxkbcommon-dev libfuse2 file

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: 'qtmultimedia qtpdf'
          cache: true

      - name: Configure
        run: |
          cmake -S native -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMYMEDIAVAULT_BUILD_APP=ON \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Package (AppImage)
        run: |
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin
          cp build/MyMediaVault $APPDIR/usr/bin/
          cp native/resources/appicon.png MyMediaVault.png
          cat > MyMediaVault.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=My Media Vault
          Exec=MyMediaVault
          Icon=MyMediaVault
          Categories=AudioVideo;Player;
          Terminal=false
          EOF
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export EXTRA_QT_PLUGINS="multimedia;tls;networkinformation;imageformats"
          export OUTPUT=MyMediaVault-linux-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir $APPDIR \
            -e build/MyMediaVault -i MyMediaVault.png -d MyMediaVault.desktop \
            --plugin qt --output appimage
          # $OUTPUT sets the produced name; fall back to whatever AppImage was emitted (excluding the tools).
          if [ ! -f "$OUTPUT" ]; then
            f=$(find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy*' | head -n1)
            mv "$f" "$OUTPUT"
          fi
          ls -la "$OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: MyMediaVault-linux-x86_64
          path: MyMediaVault-linux-x86_64.AppImage

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MyMediaVault-linux-x86_64.AppImage
          generate_release_notes: true

  # ---------------------------------------------------------------- Android ---
  # Android / Android TV APK. Self-provisioning: pulls a prebuilt libmpv (+ ffmpeg) from Maven Central
  # and the mpv headers from the mpv repo, then qt-cmake -> androiddeployqt -> APK.
  # Matrixed over arm64-v8a (real devices / TV) and x86_64 (emulator). The jdtech AAR ships .so's for
  # both ABIs (verified: jni/arm64-v8a/ and jni/x86_64/ both carry libmpv.so + the full libav stack).
  # See native/docs/android-port.md.
  android:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_arch: android_arm64_v8a
            jni_abi: arm64-v8a
            name: arm64
          - qt_arch: android_x86_64
            jni_abi: x86_64
            name: x86_64
          - qt_arch: android_armv7
            jni_abi: armeabi-v7a
            name: armv7
    env:
      QT_ANDROID_ARCH: ${{ matrix.qt_arch }}
      NDK_VERSION: '26.1.10909125'   # Qt 6.8's recommended NDK (r26b)
      # Release-signing secrets (empty on forks/PRs -> build stays unsigned). Mapped here so step-level
      # `if` guards can test presence without referencing the secrets context directly.
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
      - name: Install NDK + platform
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      # Host Qt (tools: moc/rcc/androiddeployqt run on the runner) ...
      - name: Install Qt (host desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          # qtdeclarative (QtQml/QtQuick) is an ESSENTIAL bundled in the Qt base install — aqt rejects it as
          # an add-on module ("packages ['qtdeclarative'] were not found"). Only genuine add-ons go here.
          modules: 'qtmultimedia qtpdf'
          cache: true
      - name: Remember host Qt
        run: echo "QT_HOST_ROOT=$QT_ROOT_DIR" >> "$GITHUB_ENV"
      # ... and the Android Qt (per-ABI) that we actually link against.
      - name: Install Qt (Android ${{ matrix.name }})
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: ${{ env.QT_ANDROID_ARCH }}
          # QtPdf isn't published for Android (PdfView is stubbed there); qtdeclarative (QtQuick/QtQml) is a
          # base essential, not an aqt add-on module, so it must NOT be listed here either.
          modules: 'qtmultimedia'
          cache: true

      # Qt Multimedia's FFmpeg *media plugin* DT_NEEDs Qt's OWN libav*/libsw* — a DIFFERENT FFmpeg build than
      # the jdtech libmpv AAR's. Both sets share sonames, so only one of each can land in the APK's lib/<abi>/.
      # In practice jdtech wins libavcodec/util/sw*/avdevice but Qt wins libavformat.so — and jdtech's
      # libavdevice.so then can't bind avpriv_register_devices against Qt's libavformat, so the process dies
      # with UnsatisfiedLinkError in QtLoader BEFORE main() (see d2-task-6 report). Fix: remove Qt's FFmpeg
      # plugin + libs from the kit so androiddeployqt bundles ONLY jdtech's matched FFmpeg set (libmpv then
      # binds a single coherent build). QtMultimedia stays fully functional via the Android (OpenSL ES / Media
      # Codec) backend — QAudioSink emulator audio, QSoundEffect menu SFX and QMediaDevices need no FFmpeg; all
      # app media decode goes through libmpv regardless. No QMediaPlayer/FFmpeg-decode path is used on Android.
      - name: Drop Qt Multimedia's FFmpeg backend (SONAME clash with libmpv's FFmpeg)
        run: |
          set -e
          KIT="$QT_ROOT_DIR"
          echo "Pruning Qt FFmpeg backend from kit: $KIT"
          # 1) The FFmpeg media plugin .so itself.
          echo "--- ffmpeg media plugin(s):"
          find "$KIT" -name '*ffmpegmediaplugin*' -print -delete || true
          # 2) Its CMake package files. find_package(Qt6 Multimedia) auto-includes every
          #    lib/cmake/Qt6Multimedia/Qt6*PluginConfig.cmake (file(GLOB)+include) and declares an IMPORTED
          #    target whose IMPORTED_LOCATION is the plugin .so — configure hard-fails if that .so is gone.
          #    Removing the plugin's *Config.cmake drops it from the glob, so the target is never declared.
          echo "--- ffmpeg plugin CMake package files:"
          find "$KIT" -path '*cmake/Qt6Multimedia/*QFFmpegMediaPlugin*' -print -delete || true
          # 3) Qt's own libav*/libsw* (a different FFmpeg build than jdtech's; sonames collide in the APK).
          echo "--- Qt-bundled libav*/libsw*:"
          find "$KIT" \( -name 'libav*.so' -o -name 'libsw*.so' \) -print -delete || true
          echo "--- remaining ffmpeg artifacts in kit (expect none):"
          LEFT=$(find "$KIT" \( -name '*ffmpegmediaplugin*' -o -name 'libav*.so' -o -name 'libsw*.so' -o -path '*QFFmpegMediaPlugin*' \) -print)
          if [ -n "$LEFT" ]; then
            echo "$LEFT"
            echo "FATAL: Qt FFmpeg artifacts survived the prune (would clash with libmpv's FFmpeg in the APK)"
            exit 1
          fi
          echo "(none)"

      - name: Provide libmpv for Android
        env:
          # Prebuilt libmpv (+ its ffmpeg stack) from the Jellyfin/jdtech AAR on Maven Central, and matching
          # public mpv headers (the AAR ships none). The AAR carries per-ABI jni/ dirs; we pull the one for
          # this matrix ABI. Override LIBMPV_AAR_URL via a repo variable to pin a different prebuilt.
          LIBMPV_AAR_URL: ${{ vars.LIBMPV_AAR_URL || 'https://repo1.maven.org/maven2/dev/jdtech/mpv/libmpv/1.0.0/libmpv-1.0.0.aar' }}
          MPV_HEADERS_TAG: 'v0.40.0'
          JNI_ABI: ${{ matrix.jni_abi }}
        run: |
          set -e
          curl -fL "$LIBMPV_AAR_URL" -o libmpv.aar
          mkdir -p mpv-android/libs mpv-android/include/mpv
          unzip -o -j libmpv.aar "jni/${JNI_ABI}/*.so" -d mpv-android/libs
          # libplayer.so is jdtech's JNI wrapper (unused) - drop it. libmpv.so + the libav*/libsw* deps ride along.
          rm -f mpv-android/libs/libplayer.so
          # libc++: jdtech built libmpv against a NEWER libc++ than Qt's NDK (r26b, LLVM 17) ships — libmpv.so
          # imports std::__ndk1::__from_chars_floating_point<float>, absent from r26b's libc++_shared.so, which
          # crashed the app at libmpv load (UnsatisfiedLinkError, before main). libc++ is forward-compatible and
          # (verified against the built APK) jdtech's libc++ defines every libc++ symbol the Qt/app/mpv libs
          # reference, so REPLACE the NDK runtime libc++_shared.so that androiddeployqt bundles with jdtech's.
          # Then drop jdtech's from mpv-android/libs so EXTRA_LIBS doesn't also add it (same soname -> collision).
          case "$JNI_ABI" in
            x86_64)     TRIPLE=x86_64-linux-android ;;
            arm64-v8a)  TRIPLE=aarch64-linux-android ;;
            armeabi-v7a) TRIPLE=arm-linux-androideabi ;;
            *) echo "unknown ABI $JNI_ABI"; exit 1 ;;
          esac
          NDK_LIBCXX=$(find "$ANDROID_NDK_ROOT" -path "*/$TRIPLE/libc++_shared.so" | head -1)
          [ -n "$NDK_LIBCXX" ] || { echo "NDK libc++_shared.so not found for $TRIPLE"; exit 1; }
          # Assert the swap DIRECTION before clobbering the NDK runtime. __from_chars_floating_point is the
          # discriminating symbol: libmpv imports it and the crash was the NDK's libc++_shared.so not exporting
          # it. Decide from the symbol tables (llvm-nm -D, grep -a fallback) rather than assuming jdtech's is
          # always newer:
          #   - NDK already exports it        -> NDK libc++ is new enough; keep it, drop jdtech's copy.
          #   - NDK lacks it, jdtech's has it -> replace the bundled NDK runtime with jdtech's newer build.
          #   - neither exports it            -> assumption is stale; FAIL loudly instead of shipping a crash.
          DISCRIM_SYM=__from_chars_floating_point
          NM=$(find "$ANDROID_NDK_ROOT" \( -name 'llvm-nm' -o -name 'llvm-nm.exe' \) 2>/dev/null | head -1)
          has_sym() { # $1 = path to a .so
            if [ -n "$NM" ]; then "$NM" -D "$1" 2>/dev/null | grep -q "$DISCRIM_SYM"
            else grep -aq "$DISCRIM_SYM" "$1"; fi
          }
          if has_sym "$NDK_LIBCXX"; then
            echo "NDK libc++ ($NDK_LIBCXX) already exports $DISCRIM_SYM — no swap needed"
            rm -f mpv-android/libs/libc++_shared.so
          elif has_sym mpv-android/libs/libc++_shared.so; then
            echo "NDK libc++ lacks $DISCRIM_SYM; jdtech's provides it — replacing NDK runtime ($NDK_LIBCXX)"
            cp -f mpv-android/libs/libc++_shared.so "$NDK_LIBCXX"
            rm -f mpv-android/libs/libc++_shared.so
          else
            echo "FATAL: neither the NDK nor jdtech's libc++_shared.so exports $DISCRIM_SYM — libc++ swap assumption is stale"
            exit 1
          fi
          ls -la mpv-android/libs
          for h in client.h render.h render_gl.h stream_cb.h; do
            curl -fsSL "https://raw.githubusercontent.com/mpv-player/mpv/${MPV_HEADERS_TAG}/include/mpv/$h" \
              -o "mpv-android/include/mpv/$h"
          done
          echo "MPV_LIBRARY=$(realpath mpv-android/libs/libmpv.so)" >> "$GITHUB_ENV"
          echo "MPV_INCLUDE_DIR=$(realpath mpv-android/include)" >> "$GITHUB_ENV"

      # OpenSSL runtime for Android TLS. The APK bundles Qt's OpenSSL *plugin*
      # (libplugins_tls_qopensslbackend) but NOT a per-ABI libssl/libcrypto, so on-device Qt's dlopen of the
      # system /system/lib*/libcrypto.so is namespace-denied by Android's linker ("... is not accessible for
      # the namespace") and every HTTPS request dies with "No TLS backend is available" — zero addon content,
      # metadata, or downloads (verified on armv7 TV, but ALL THREE ABIs ship the same gap; this fetch is
      # matrixed so arm64 + x86_64 are fixed by the same leg). Fix: bundle KDAB's prebuilt OpenSSL 3 .so's
      # (ssl_3 matches Qt 6.8's OpenSSL 3) for THIS ABI into the APK's lib/<abi>/ via QT_ANDROID_EXTRA_LIBS
      # (the same mechanism libmpv rides), so Qt's TLS backend loads them from the app's own linker namespace.
      - name: Provide OpenSSL for Android (per-ABI libssl/libcrypto)
        env:
          JNI_ABI: ${{ matrix.jni_abi }}
        run: |
          set -e
          git clone --depth 1 https://github.com/KDAB/android_openssl.git android_openssl
          SSL_DIR="android_openssl/ssl_3/${JNI_ABI}"
          [ -d "$SSL_DIR" ] || { echo "No OpenSSL 3 prebuilts for ABI $JNI_ABI at $SSL_DIR"; ls android_openssl/ssl_3 || true; exit 1; }
          echo "--- bundling OpenSSL for $JNI_ABI:"; ls -la "$SSL_DIR"
          echo "OPENSSL_ANDROID_LIBS_DIR=$(realpath "$SSL_DIR")" >> "$GITHUB_ENV"

      # Release signing (Qt 6.8 androiddeployqt env route): decode the persistent MyMediaVault release keystore
      # to the runner and expose QT_ANDROID_SIGN_APK + keystore path/alias/store+key pass via $GITHUB_ENV, so the
      # `apk` build target signs the release APK with the release key. Guarded on the secret being present — forks
      # and PRs from forks (no secrets) skip this and still build an *unsigned* release APK. The passwords come
      # from secrets, so GitHub auto-masks them in logs; the password is alphanumeric (no `=`/newline) so the
      # KEY=VALUE env-file lines are safe.
      - name: Set up release signing
        if: ${{ env.ANDROID_KEYSTORE_B64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/mmv-release.keystore"
          {
            echo "QT_ANDROID_SIGN_APK=1"
            echo "QT_ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/mmv-release.keystore"
            echo "QT_ANDROID_KEYSTORE_ALIAS=$ANDROID_KEY_ALIAS"
            echo "QT_ANDROID_KEYSTORE_STORE_PASS=$ANDROID_KEYSTORE_PASS"
            echo "QT_ANDROID_KEYSTORE_KEY_PASS=$ANDROID_KEYSTORE_PASS"
          } >> "$GITHUB_ENV"
          echo "Release signing enabled (alias: $ANDROID_KEY_ALIAS)."

      - name: Configure (qt-cmake)
        run: |
          # A freshly aqt-extracted Android kit (no prior cache — e.g. the armv7 ABI) can land qt-cmake
          # without its execute bit, so the wrapper dies with "Permission denied" (exit 126). Cached kits
          # keep perms from the tarball, so this is a no-op for them. Restore +x before invoking.
          chmod +x "$QT_ROOT_DIR/bin/"* 2>/dev/null || true
          # CMAKE_BUILD_TYPE=Release makes androiddeployqt build a *release* APK (the prerequisite for
          # QT_ANDROID_SIGN_APK to sign it; a Debug/unset build would emit a debug-signed APK instead).
          "$QT_ROOT_DIR/bin/qt-cmake" -S native -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST_ROOT" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -DMYMEDIAVAULT_BUILD_APP=ON \
            -DMPV_INCLUDE_DIR="$MPV_INCLUDE_DIR" \
            -DMPV_LIBRARY="$MPV_LIBRARY" \
            -DOPENSSL_ANDROID_LIBS_DIR="$OPENSSL_ANDROID_LIBS_DIR"
          # SDL2-for-Android (gamepad) is optional; omitted here, so the first APK builds without controller input.

      - name: Build APK
        run: cmake --build build-android

      - name: Collect APK
        env:
          ABI_NAME: ${{ matrix.name }}
        run: |
          # Prefer the SIGNED release APK; then a non-'unsigned' release/debug APK; then anything.
          apk=$(find build-android -name '*-signed.apk' | head -n1)
          [ -n "$apk" ] || apk=$(find build-android -name '*.apk' | grep -iE 'release|debug' | grep -vi 'unsigned' | head -n1)
          [ -n "$apk" ] || apk=$(find build-android -name '*.apk' | head -n1)
          [ -n "$apk" ] || { echo "No APK produced"; find build-android -name '*.apk' -o -name '*.aab'; exit 1; }
          cp "$apk" "MyMediaVault-android-${ABI_NAME}.apk"
          echo "Collected APK: $apk"
          ls -la "MyMediaVault-android-${ABI_NAME}.apk"
          # Sanity: the staged assets and the qtdeclarative/mpv .so's must actually be inside the APK.
          echo "=== APK assets/mmv (expect themes2 + addons) ==="; unzip -l "MyMediaVault-android-${ABI_NAME}.apk" | grep -E 'assets/mmv' | head -20 || true
          echo "=== APK libs (expect libmpv + libQt6Quick) ==="; unzip -l "MyMediaVault-android-${ABI_NAME}.apk" | grep -E 'lib/.*(libmpv|Qt6Quick|Qt6Qml)' | head -20 || true
          echo "=== APK OpenSSL (expect libssl + libcrypto — TLS) ==="
          if ! unzip -l "MyMediaVault-android-${ABI_NAME}.apk" | grep -E 'lib/.*(libssl|libcrypto)'; then
            echo "FATAL: no libssl/libcrypto bundled — TLS would be dead on device (F2)"; exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: MyMediaVault-android-${{ matrix.name }}
          path: MyMediaVault-android-${{ matrix.name }}.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MyMediaVault-android-${{ matrix.name }}.apk
          generate_release_notes: true
