name = "mymediavault-tmdb-addon"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Deploy:
#   npm i -g wrangler
#   wrangler login
#   wrangler secret put TMDB_API_KEY      # paste your TMDB v3 API key
#   wrangler deploy
#
# Your addon URL is then:  https://mymediavault-tmdb-addon.<your-subdomain>.workers.dev
# Add it in the app:  Add-ons -> Add addon by URL.
