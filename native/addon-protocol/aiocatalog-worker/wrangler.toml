name = "mymediavault-aiocatalog"
main = "src/worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_als"]   # AsyncLocalStorage, for per-request (per-user) config isolation

# Keys are per-user — each person enters their own in the app (Add-ons -> Add by URL, then Configure…),
# so the Worker needs NO secrets. Just:
#   npm i -g wrangler
#   wrangler login
#   wrangler deploy
#
# Addon URL:  https://mymediavault-aiocatalog.<your-subdomain>.workers.dev
#
# (Optional self-host fallback: if you'd rather hard-code keys for your own private Worker, set them as
#  secrets and they apply when a request carries no per-user config:
#    wrangler secret put TMDB_API_KEY ; wrangler secret put IGDB_CLIENT_ID ; ... )
